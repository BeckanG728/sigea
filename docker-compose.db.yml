services:
  sigea-db:
    image: postgres:15
    container_name: postgres-main
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    networks:
      - sigea-network

networks:
  sigea-network:
    driver: bridge

volumes:
  postgres_main_data: