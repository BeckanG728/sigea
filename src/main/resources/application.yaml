spring:
  application:
    name: sigea
  profiles:
    active: dev
  jpa:
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.institucion.sigea: INFO
    org.springframework.security: WARN

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

aes:
  secret: ${AES_SECRET_KEY}

totp:
  issuer: ${TOTP_ISSUER}

superuser:
  username: ${SUPERUSER_USERNAME}
  password: ${SUPERUSER_PASSWORD}